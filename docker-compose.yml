services:
  easy-img-studio-web:
    build:
      context: .
      dockerfile: web_app/Dockerfile
    container_name: easy-img-studio-web
    ports:
      - "8000:8000"
    volumes:
      - ./Model:/app/Model
      - ./weights:/app/weights
      - ./web_app/app/data:/app/app/data
    restart: unless-stopped
